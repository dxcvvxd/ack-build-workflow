name: Verify Android Kernel Setup

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      ack_branch:
        description: 'Android-common-kernel branch'
        required: true
        default: 'common-android13-5.15'
        type: string

      custom_kernel_repo:
        description: 'Custom kernel repository'
        required: true
        default: 'https://github.com/dxcvvxd/device_xiaomi_gemstones-kernel'
        type: string

      custom_kernel_repo_branch:
        description: 'Custom kernel repository branch'
        required: true
        default: 'android13-5.15-lts'
        type: string

      build_configs:
        description: 'Space-separated build configs'
        required: true
        default: 'build.config.gki.aarch64.chickernel.ksun.susfs'
        type: string

jobs:
  verify:
    runs-on: ubuntu-24.04

    env:
      ACK_BRANCH: ${{ github.event.inputs.ack_branch }}
      COMMON_REPO: ${{ github.event.inputs.custom_kernel_repo }}
      COMMON_REPO_BRANCH: ${{ github.event.inputs.custom_kernel_repo_branch }}
      BUILD_CONFIGS: ${{ github.event.inputs.build_configs }}

    steps:
      - name: Validate inputs
        run: |
          validate_url() {
            if [[ ! "$1" =~ ^https://.+/.+/.+$ ]]; then
              echo "::error::Invalid URL: $1"
              exit 1
            fi
          }

          validate_single_word() {
            if [[ "$1" =~ [[:space:]] ]]; then
              echo "::error::Invalid $2: $1"
              exit 1
            fi
          }

          validate_url "${COMMON_REPO}"

          validate_single_word "${ACK_BRANCH}" \
          "ACK branch"

          validate_single_word "${COMMON_REPO_BRANCH}" \
          "Kernel repo branch"

      - name: Install repo tool
        run: |
          mkdir -p ~/.bin
          curl -L https://storage.googleapis.com/git-repo-downloads/repo > ~/.bin/repo
          chmod a+rx ~/.bin/repo

          echo "${HOME}/.bin" >> ${GITHUB_PATH}

      - name: Setup workspace
        working-directory: ${{ github.workspace }}
        run: |
          mkdir kernel-build
          cd kernel-build

          mkdir -p .repo/local_manifests

          REPO_SOURCE=$(echo ${COMMON_REPO} | cut -d'/' -f3)
          REPO_OWNER=$(echo ${COMMON_REPO} | cut -d'/' -f4)
          REPO_NAME=$(echo ${COMMON_REPO} | cut -d'/' -f5)

          cat > .repo/local_manifests/custom.xml <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <manifest>
            <remote name="common-repo"
                    fetch="https://${REPO_SOURCE}/${REPO_OWNER}" />

            <remove-project name="kernel/common" />

            <project
              path="common"
              name="${REPO_NAME}"
              remote="common-repo"
              revision="${COMMON_REPO_BRANCH}">
              <linkfile src="." dest=".source_date_epoch_dir" />
            </project>
          </manifest>
          EOF

      - name: Initialize and sync
        working-directory: kernel-build
        run: |
          repo init \
            --depth=1 \
            --no-tags \
            --dissociate \
            -u https://android.googlesource.com/kernel/manifest \
            -b ${ACK_BRANCH}

          repo sync \
            --depth=1 \
            --current-branch \
            --no-tags \
            --optimized-fetch \
            --fetch-submodules \
            -j$(nproc --all)

      - name: Verify build configs exist
        working-directory: kernel-build/common
        run: |
          for config in ${BUILD_CONFIGS}; do
            echo "Checking ${config}"

            if [ ! -f "${config}" ]; then
              echo "::error::Missing build config: ${config}"
              exit 1
            fi
          done

      - name: Verify KernelSU submodule
        working-directory: kernel-build/common/KernelSU-Next
        run: |
          echo "Branch:"
          git branch --show-current

          echo
          echo "Latest commit:"
          git log --oneline -1

          echo
          echo "Version info:"
          echo "commit_count=$(git rev-list --count HEAD)"
          echo "describe=$(git describe --tags --always)"

      - name: Verify KernelSU manager compatibility
        working-directory: kernel-build/common/KernelSU-Next
        run: |
          echo "Kernel minimum supported version:"
          grep -R "MINIMAL_SUPPORTED_KERNEL" -n manager/app/src/main/java || true

          echo
          echo "Kernel version generation:"
          grep -R "KSU_VERSION" -n kernel/Kbuild || true

      - name: Verify KSU config flags
        working-directory: kernel-build/common
        run: |
          echo "Searching for KSU configs..."
          grep -R "CONFIG_KSU" -n arch/arm64/configs || true

      - name: Verify removed legacy hooks
        working-directory: kernel-build/common
        run: |
          echo "Checking for old non-kprobe hooks..."

          if grep -R "ksu_handle_execveat" fs drivers --exclude-dir=KernelSU-Next; then
            echo "::warning::Legacy execve hook references found"
          else
            echo "No legacy execve hooks found"
          fi

          if grep -R "ksu_vfs_read_hook" fs drivers --exclude-dir=KernelSU-Next; then
            echo "::warning::Legacy read hook references found"
          else
            echo "No legacy read hooks found"
          fi

      - name: Verify workflow environment
        run: |
          echo "ACK_BRANCH=${ACK_BRANCH}"
          echo "COMMON_REPO=${COMMON_REPO}"
          echo "COMMON_REPO_BRANCH=${COMMON_REPO_BRANCH}"
          echo "BUILD_CONFIGS=${BUILD_CONFIGS}"

      - name: Verification complete
        run: |
          echo "All verification checks completed successfully."
